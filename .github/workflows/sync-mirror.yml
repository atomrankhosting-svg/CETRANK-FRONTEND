name: Sync to Mirror Repo

on:
  push:
    branches:
      - '**'          # triggers on pushes to ANY branch
  delete:             # also sync branch/tag deletions
    branches:
      - '**'

jobs:
  sync:
    name: Mirror push to atomrankhosting-svg/CETRANK-FRONTEND
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the full history of the source repo ──────────────────
      - name: Checkout source repo (full clone)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history, not a shallow clone
          fetch-tags: true        # include tags

      # ── 2. Configure Git identity ─────────────────────────────────────────
      - name: Set Git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── 3. Set up SSH using the deploy key secret ─────────────────────────
      - name: Setup SSH deploy key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.MIRROR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      # ── 4. Push the current branch to the mirror ──────────────────────────
      - name: Push to mirror (atomrankhosting-svg)
        run: |
          git remote add mirror git@github.com:atomrankhosting-svg/CETRANK-FRONTEND.git

          # --force ensures diverged histories are overwritten on the mirror
          git push mirror HEAD:${{ github.ref }} --force

      # ── 5. Also sync all tags ─────────────────────────────────────────────
      - name: Sync tags to mirror
        run: |
          git push mirror --tags --force
